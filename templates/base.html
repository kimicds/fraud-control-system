<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fraud Risk Control System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Inter',sans-serif; background:#f4f6f9; padding-top:90px; font-size:1.1rem; }
.navbar { background: linear-gradient(90deg,#0d6efd,#6610f2); box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.navbar-brand { font-size:1.8rem; font-weight:700; }
.nav-link { font-size:1.1rem; font-weight:600; }
.hero { text-align:center; padding:80px 20px; }
.hero h1 { font-size:3rem; font-weight:700; }
.hero p { font-size:1.3rem; color:#6c757d; }
.feature-card, .page-card { border-radius:16px; padding:30px; background:white; box-shadow:0 6px 25px rgba(0,0,0,0.07); transition:all .25s; margin-bottom:25px; }
.feature-card:hover, .page-card:hover { transform:translateY(-5px); box-shadow:0 10px 30px rgba(0,0,0,0.12); }
.section-title { font-weight:700; margin-bottom:25px; font-size:1.6rem; text-align:center; }
.btn-lg { font-size:1.2rem; padding:12px 30px; }
table th { font-size:1.1rem; }
table td { font-size:1.05rem; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('about') }}">Fraud Control</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">About</a></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('data_entry') }}">Data Entry</a></li>
    </ul>
  </div>
</nav>

<div class="container mt-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} mt-3">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
